services:
  - type: web
    name: billionsai-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: DID_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
